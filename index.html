<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>С Днём Рождения!</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(120deg, #ff9a9e, #fad0c4);
      color: #fff;
      text-align: center;
      overflow: hidden;
    }

    .container {
      position: relative;
      top: 50%;
      transform: translateY(-50%);
    }

    h1 {
      font-size: 3em;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.5em;
    }

    button {
      margin-top: 20px;
      padding: 15px 30px;
      font-size: 1em;
      border: none;
      border-radius: 30px;
      background: #fff;
      color: #ff6f91;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #ff6f91;
      color: #fff;
    }

    .hidden-message {
      display: none;
      margin-top: 20px;
      font-size: 1.3em;
    }

    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      background: white;
      animation: fall 3s linear infinite;
    }

    @keyframes fall {
      0% { transform: translateY(-100vh); }
      100% { transform: translateY(100vh); }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🎉 С Днём Рождения! 🎉</h1>
  <p id="name">Дорогой друг!</p>
  <button onclick="showMessage()">Нажми на меня 🎁</button>
  <div class="hidden-message" id="message">
    Желаю тебе счастья, здоровья и исполнения всех мечт! 🚀
  </div>
</div>

<script>
  function showMessage() {
    document.getElementById('message').style.display = 'block';
    createConfetti();
  }

  function createConfetti() {
    for (let i = 0; i < 100; i++) {
      let confetti = document.createElement('div');
      confetti.classList.add('confetti');
      confetti.style.left = Math.random() * 100 + 'vw';
      confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
      confetti.style.backgroundColor = getRandomColor();
      document.body.appendChild(confetti);
    }
  }

  function getRandomColor() {
    const colors = ['#ff6f91', '#ff9671', '#ffc75f', '#f9f871', '#00c9a7'];
    return colors[Math.floor(Math.random() * colors.length)];
  }
</script>

</body>
</html>
